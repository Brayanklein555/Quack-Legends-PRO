<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Legends Arena: Rise</title>
    <style>
        :root {
            --bg: #050505; --panel: #0f0f0f; --neon: #00f3ff; --gold: #ffcc00; --white: #ffffff;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; background: var(--bg); color: var(--white); 
            font-family: 'Segoe UI', sans-serif; overflow: hidden; touch-action: manipulation;
        }

        /* UI SUPERIOR (Status) */
        .hud {
            display: flex; justify-content: space-around; padding: 15px;
            background: linear-gradient(to bottom, #000, transparent);
            border-bottom: 1px solid rgba(0, 243, 255, 0.3);
        }
        .stat-card { text-align: center; font-weight: bold; font-size: 14px; }
        .stat-card span { display: block; color: var(--neon); font-size: 18px; }

        /* ÁREA DO PERSONAGEM (Visual Principal) */
        .stage {
            height: 40vh; display: flex; flex-direction: column;
            justify-content: center; align-items: center; position: relative;
        }
        .avatar-glow {
            width: 120px; height: 120px; border-radius: 50%;
            background: radial-gradient(circle, rgba(0,243,255,0.2) 0%, transparent 70%);
            display: flex; justify-content: center; align-items: center;
            animation: pulse 2s infinite;
        }
        .avatar {
            font-size: 60px; filter: drop-shadow(0 0 10px var(--neon));
            transition: transform 0.3s;
        }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }

        /* SISTEMA DE ABAS */
        .tabs {
            display: flex; background: var(--panel); border-top: 1px solid #222;
            position: fixed; bottom: 0; width: 100%; height: 70px;
        }
        .tab-btn {
            flex: 1; border: none; background: none; color: #666;
            font-size: 12px; text-transform: uppercase; padding-top: 10px;
        }
        .tab-btn.active { color: var(--neon); border-top: 2px solid var(--neon); }

        /* TELAS */
        .screen { display: none; padding: 20px; height: calc(60vh - 70px); overflow-y: auto; }
        .screen.active { display: block; }

        /* BOTÕES E CARDS */
        .card {
            background: #151515; border: 1px solid #222; border-radius: 12px;
            padding: 15px; margin-bottom: 10px; display: flex; 
            justify-content: space-between; align-items: center;
        }
        .btn-action {
            background: var(--neon); color: #000; border: none;
            padding: 10px 20px; border-radius: 5px; font-weight: bold;
        }
        .btn-action:disabled { background: #333; color: #666; }

        /* ARENA DE CORRIDA (MINI GAME) */
        #race-track {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 1000; display: none;
        }
        .lane { height: 25%; border-bottom: 1px dashed #333; position: relative; }
        .racer { position: absolute; left: 0; top: 50%; transform: translateY(-50%); font-size: 30px; transition: left 0.1s linear; }

    </style>
</head>
<body>

    <div id="game-ui">
        <div class="hud">
            <div class="stat-card">DINHEIRO<span id="gold">0</span></div>
            <div class="stat-card">ENERGIA<span id="energy">100</span></div>
            <div class="stat-card">NÍVEL<span id="level">1</span></div>
        </div>

        <div class="stage">
            <div class="avatar-glow">
                <div id="main-char" class="avatar">🤖</div>
            </div>
            <h2 id="char-rank" style="color: var(--gold); margin-top: 10px;">RECRUTA</h2>
        </div>

        <div id="train" class="screen active">
            <div class="card">
                <div><b>VELOCIDADE</b><br><small id="val-speed">10</small></div>
                <button class="btn-action" onclick="game.train('speed')">TREINAR (5⚡)</button>
            </div>
            <div class="card">
                <div><b>FORÇA</b><br><small id="val-strength">10</small></div>
                <button class="btn-action" onclick="game.train('strength')">TREINAR (5⚡)</button>
            </div>
        </div>

        <div id="arena" class="screen">
            <h3>CAMPEONATOS</h3>
            <div class="card">
                <div><b>COPA NEON</b><br><small>Prêmio: 50💰</small></div>
                <button class="btn-action" onclick="game.startRace()">CORRER</button>
            </div>
        </div>

        <div id="shop" class="screen">
            <h3>CUSTOMIZAÇÃO</h3>
            <div class="card" onclick="game.changeSkin('🤖')"><span>ROBÔ</span><span>GRÁTIS</span></div>
            <div class="card" onclick="game.changeSkin('🦁')"><span>LEÃO</span><span>100💰</span></div>
            <div class="card" onclick="game.changeSkin('🐉')"><span>DRAGÃO</span><span>500💰</span></div>
        </div>

        <nav class="tabs">
            <button class="tab-btn active" onclick="game.nav('train', this)">TREINO</button>
            <button class="tab-btn" onclick="game.nav('arena', this)">ARENA</button>
            <button class="tab-btn" onclick="game.nav('shop', this)">LOJA</button>
        </nav>
    </div>

    <div id="race-track">
        <div class="lane"><div id="p1" class="racer">🤖</div></div>
        <div class="lane"><div id="p2" class="racer">👾</div></div>
        <div id="race-msg" style="position:absolute; bottom:50px; width:100%; text-align:center; font-size:24px;"></div>
    </div>

    <script>
        const game = {
            data: {
                gold: 50, energy: 100, level: 1,
                speed: 10, strength: 10, skin: '🤖'
            },

            init() {
                this.load();
                this.updateUI();
                setInterval(() => this.regenEnergy(), 5000);
            },

            nav(id, btn) {
                document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.getElementById(id).classList.add('active');
                btn.classList.add('active');
            },

            train(type) {
                if (this.data.energy >= 5) {
                    this.data.energy -= 5;
                    this.data[type] += 2;
                    this.data.level = Math.floor((this.data.speed + this.data.strength) / 10);
                    this.save();
                    this.updateUI();
                }
            },

            startRace() {
                const track = document.getElementById('race-track');
                track.style.display = 'block';
                let p1Pos = 0; let p2Pos = 0;
                const rivalSpeed = 8 + (this.data.level * 1.5);

                const loop = setInterval(() => {
                    p1Pos += (this.data.speed / 10) + Math.random();
                    p2Pos += (rivalSpeed / 10) + Math.random();

                    document.getElementById('p1').style.left = p1Pos + '%';
                    document.getElementById('p2').style.left = p2Pos + '%';

                    if (p1Pos >= 90 || p2Pos >= 90) {
                        clearInterval(loop);
                        const win = p1Pos >= 90;
                        document.getElementById('race-msg').innerText = win ? "VOCÊ VENCEU! +50💰" : "VOCÊ PERDEU!";
                        if(win) this.data.gold += 50;
                        
                        setTimeout(() => {
                            track.style.display = 'none';
                            document.getElementById('p1').style.left = '0';
                            document.getElementById('p2').style.left = '0';
                            this.save();
                        }, 2000);
                    }
                }, 50);
            },

            changeSkin(s) {
                this.data.skin = s;
                this.save();
            },

            regenEnergy() {
                if (this.data.energy < 100) {
                    this.data.energy += 1;
                    this.updateUI();
                }
            },

            updateUI() {
                document.getElementById('gold').innerText = this.data.gold;
                document.getElementById('energy').innerText = this.data.energy;
                document.getElementById('level').innerText = this.data.level;
                document.getElementById('val-speed').innerText = this.data.speed;
                document.getElementById('val-strength').innerText = this.data.strength;
                document.getElementById('main-char').innerText = this.data.skin;
                document.getElementById('p1').innerText = this.data.skin;
            },

            save() { localStorage.setItem('legendsArena', JSON.stringify(this.data)); this.updateUI(); },
            load() { const d = localStorage.getItem('legendsArena'); if(d) this.data = JSON.parse(d); }
        };

        game.init();
    </script>
</body>
</html>

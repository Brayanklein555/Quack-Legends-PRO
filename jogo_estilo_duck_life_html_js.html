<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quack Legends PRO</title>
<style>
body{margin:0;font-family:Arial;background:#0f172a;color:white}
#game{padding:20px;text-align:center}
button{padding:10px;margin:5px;border-radius:10px}
canvas{background:#38bdf8;border-radius:10px}
</style>
</head>
<body>
<div id="game"></div>

<script>
// ===== SALVAMENTO AUTOMÁTICO =====
function salvar(){
 localStorage.setItem("save", JSON.stringify(player));
}
function carregar(){
 let save = localStorage.getItem("save");
 if(save) player = JSON.parse(save);
}

// ===== PLAYER =====
let player = {
 nome:"Pato",
 nivel:1,
 xp:0,
 energia:100,
 maxEnergia:100,
 moedas:200,
 velocidade:1,
 forca:1,
 resistencia:1,
 roupas:[],
 casa:{nivel:1, conforto:1},
 carro:{velocidade:1},
 cidade:"Inicial"
};

carregar();

// ===== XP =====
function ganharXP(q){
 player.xp += q;
 if(player.xp >= player.nivel*50){
  player.xp=0;
  player.nivel++;
 }
}

// ===== MENU =====
function menu(){
 salvar();
 document.getElementById("game").innerHTML=`
 <h2>🦆 Nível ${player.nivel}</h2>
 <p>XP: ${player.xp}</p>
 <p>Energia: ${player.energia}</p>
 <p>Moedas: ${player.moedas}</p>
 <button onclick="mapa()">🌎 Mapa</button>
 <button onclick="treino()">Treinar</button>
 <button onclick="historia()">História</button>
 `;
}

// ===== MAPA =====
function mapa(){
 document.getElementById("game").innerHTML=`
 <h2>🌎 Mundo</h2>
 <button onclick="cidade('Cidade Inicial')">Cidade Inicial</button>
 <button onclick="cidade('Cidade Elite')">Cidade Elite</button>
 <br><button onclick="menu()">Voltar</button>
 `;
}

function cidade(nome){
 player.cidade = nome;
 document.getElementById("game").innerHTML=`
 <h2>${nome}</h2>
 <button onclick="loja()">Loja</button>
 <button onclick="casa()">Casa</button>
 <button onclick="corrida()">Corrida</button>
 <button onclick="menu()">Voltar</button>
 `;
}

// ===== TREINOS =====
function treino(){
 document.getElementById("game").innerHTML=`
 <h2>Treino</h2>
 <button onclick="miniGame()">Mini Jogo</button>
 <br><button onclick="menu()">Voltar</button>
 `;
}

function miniGame(){
 let canvas = document.createElement("canvas");
 canvas.width=300; canvas.height=200;
 document.getElementById("game").innerHTML="";
 document.getElementById("game").appendChild(canvas);
 let ctx = canvas.getContext("2d");

 let x=0;
 function loop(){
  ctx.clearRect(0,0,300,200);
  ctx.fillStyle="yellow";
  ctx.fillRect(x,100,30,30);
  x+=2;
  requestAnimationFrame(loop);
 }
 loop();

 canvas.onclick=()=>{
  player.velocidade+=0.2;
  player.moedas+=5;
  ganharXP(10);
  menu();
 }
}

// ===== IA AVANÇADA =====
function corrida(){
 let inimigo = player.nivel + Math.random()*player.nivel;
 let poder = player.velocidade + player.forca;

 if(poder > inimigo){
  alert("Vitória!");
  player.moedas+=100;
 } else {
  alert("Derrota");
 }
 menu();
}

// ===== LOJA =====
function loja(){
 document.getElementById("game").innerHTML=`
 <h2>Loja</h2>
 <button onclick="comprar('comum')">Item comum</button>
 <button onclick="comprar('raro')">Item raro</button>
 <button onclick="comprar('lendario')">Item lendário</button>
 <br><button onclick="menu()">Voltar</button>
 `;
}

function comprar(tipo){
 let preco = {comum:20,raro:80,lendario:200}[tipo];
 if(player.moedas>=preco){
  player.moedas-=preco;
  player.roupas.push(tipo);
 }
 menu();
}

// ===== CASA =====
function casa(){
 document.getElementById("game").innerHTML=`
 <h2>Casa</h2>
 <p>Conforto: ${player.casa.conforto}</p>
 <button onclick="dormir()">Dormir</button>
 <button onclick="melhorarCasa()">Melhorar</button>
 <br><button onclick="menu()">Voltar</button>
 `;
}

function dormir(){
 player.energia = player.maxEnergia + player.casa.conforto*10;
 menu();
}

function melhorarCasa(){
 if(player.moedas>=100){
  player.moedas-=100;
  player.casa.conforto++;
 }
 menu();
}

// ===== HISTÓRIA =====
function historia(){
 document.getElementById("game").innerHTML=`
 <h2>História</h2>
 <p>Você é um pequeno pato tentando se tornar uma lenda...</p>
 <button onclick="menu()">Voltar</button>
 `;
}

menu();
</script>
</body>
</html>
